# =============================================================================
# MANUAL TESTS WORKFLOW TEMPLATE
# =============================================================================
# Copy this file to your app repository as .github/workflows/manual-tests.yml
# Then create .github/tests-config.json based on tests-config-template.json
# =============================================================================

name: Manual Tests

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit SHA to test (empty = default branch)"
        required: false
        type: string
      flutter_unit_tests:
        description: "Flutter unit tests"
        required: false
        type: boolean
        default: false
      patrol_integration_tests:
        description: "Patrol / Integration tests"
        required: false
        type: boolean
        default: false
      firestore_rules_tests:
        description: "Firestore rules tests"
        required: false
        type: boolean
        default: false
      functions_tests:
        description: "Functions tests"
        required: false
        type: boolean
        default: false

jobs:
  tests:
    uses: Anyhoosolutions/flutter_platform_kit/.github/workflows/reusable-manual-tests.yml@main
    with:
      ref: ${{ inputs.ref }}
      flutter_unit_tests: ${{ inputs.flutter_unit_tests }}
      patrol_integration_tests: ${{ inputs.patrol_integration_tests }}
      firestore_rules_tests: ${{ inputs.firestore_rules_tests }}
      functions_tests: ${{ inputs.functions_tests }}
